spring:
  datasource:
    url: ${JDBC_DATABASE_URL:jdbc:h2:mem:slacalc}
    driverClassName: ${JDBC_DRIVER:org.h2.Driver}
    username: ${DB_USERNAME:sa}
    password: ${DB_PASSWORD:}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: false
  sql:
    init:
      mode: always
logging:
  level:
    io.itsm.sla: INFO
