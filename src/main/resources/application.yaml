spring:
  application:
    name: itsm-sla-calculator

  # H2 для разработки
  datasource:
    url: jdbc:h2:mem:slacalc
    driverClassName: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true

  # JPA
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        format_sql: true

  # SQL init
  sql:
    init:
      mode: always
      schema-locations: classpath:schema.sql

  # Отключаем кэш статики (для разработки)
  web:
    resources:
      cache:
        period: 0

  # Cache
  cache:
    type: caffeine
    caffeine:
      spec: maximumSize=500,expireAfterWrite=1h

# Actuator
management:
  endpoints:
    web:
      exposure:
        include: health,info,refresh

# Logging
logging:
  level:
    io.itsm.sla: DEBUG
